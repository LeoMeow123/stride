      - "/home/exx/vast/leo/2025-11-04-GoPro_Tmaze_train/models_500/centered_instance.n=503"
    roi_model_paths:
      - "/home/exx/vast/leo/2025-11-26-GoPro_roi_train/models/251126_191944.centroid.n=50"
