# --- Gait extraction (Stages 4-6) -------------------------------------------
# Used by gait/run_gait_extraction.py. Thresholds match both batch notebooks.
gait_extraction:
  n_workers: 16                   # parallel workers for stride detection

# --- Stride detection thresholds --------------------------------------------
# Used by gait_extraction.py process_one_video(). Also documented for reference.
stride_detection:
  min_walk_velocity: 5.0        # cm/s — tailbase speed to classify as walking
  min_paw_velocity: 8.0         # cm/s — paw speed for swing candidacy
  min_peak_paw_velocity: 15.0   # cm/s — peak paw speed to retain swing
  min_frames_swing: 3           # minimum swing phase duration in frames
  smooth_median_window: 3       # median filter window (frames)
  smooth_moving_avg_window: 5   # moving average window (frames)
  phase_spline_k: 3             # cubic spline order for phase interpolation
  phase_grid_points: 101        # interpolation grid (0-100% stride cycle)
  maze_width_cm: 10.0           # physical corridor width for px/cm calibration

# --- Stride filtering thresholds --------------------------------------------
stride_filtering:
  confidence_threshold: 0.3     # min mean keypoint confidence per video
  angular_velocity_min: -20.0   # deg/s — straight-line walking lower bound
  angular_velocity_max: 20.0    # deg/s — straight-line walking upper bound
  remove_edge_strides: true     # remove first/last stride per sequence

# --- Trial phase tagging ---------------------------------------------------
trial_phase_tagging:
  # Strides are tagged based on their frame position relative to trial events
  task_window:
    start: "gate_frame"         # column in decisions.csv
    end: "entry_frame"          # column in decisions.csv
  poked_return_speed_threshold: 2.0  # x times the mouse's within-trial median speed
  default_filter: "task"        # which trial_phase to keep for LMM analysis

# --- Metrics to analyze -----------------------------------------------------
# Single source of truth: these 14 metrics are used in LMM, heatmaps, and figures
metrics:
  - col: stride_length_euclid_cm
    label: "Stride Length"
    category: Spatial
    units: cm

  - col: step_length_cm
    label: "Step Length"
    category: Spatial
    units: cm

  - col: step_width_cm
    label: "Step Width"
    category: Spatial
    units: cm

  - col: duration_ms
    label: "Stride Duration"
    category: Temporal
    units: ms

  - col: step_freq_hz
    label: "Step Frequency"
    category: Temporal
    units: Hz
    derived: "1000 / duration_ms"

  - col: limb_duty_factor_mean
    label: "Limb Duty Factor"
    category: Temporal
    units: unitless

  - col: temporal_symmetry
    label: "Temporal Symmetry"
    category: Temporal
    units: unitless

  - col: angular_velocity_deg_s_mean
    label: "Angular Velocity"
    category: Other
    units: deg/s

  - col: nose_lat_disp_norm
    label: "Snout Lateral Disp."
    category: Body dynamics
    units: unitless

  - col: tailbase_lat_disp_norm
    label: "Tailbase Lateral Disp."
    category: Body dynamics
    units: unitless

  - col: tailtip_lat_disp_norm
    label: "Tailtip Lateral Disp."
    category: Body dynamics
    units: unitless

  - col: nose_lat_phase_pct
    label: "Snout Phase"
    category: Phase
    units: "% stride"

  - col: tailbase_lat_phase_pct
    label: "Tailbase Phase"
    category: Phase
    units: "% stride"

  - col: tailtip_lat_phase_pct
    label: "Tailtip Phase"
    category: Phase
    units: "% stride"

# --- Covariates (not tested as outcomes) ------------------------------------
covariates:
  speed: stride_speed_cm_s_mean
  body_length: body_length_cm

# --- LMM model specifications ----------------------------------------------
models:
  M1:
    description: "Detects ALL genotype effects (including speed-mediated)"
    formula: "{outcome} ~ C(Genotype, Treatment('WT')) + scale(body_length_cm)"
    covariates: [body_length_cm]

  M2:
    description: "Isolates DIRECT genotype effects (controlling for speed)"
    formula: "{outcome} ~ C(Genotype, Treatment('WT')) + scale(stride_speed_cm_s_mean) + scale(body_length_cm)"
    covariates: [stride_speed_cm_s_mean, body_length_cm]
    skip_outcome_if_covariate: true  # skip if outcome == a covariate (e.g., stride_speed)

# --- Statistical parameters -------------------------------------------------
statistics:
  reference_genotype: "WT"
  genotype_order: ["WT", "APP", "Tau"]
  optimizer: "powell"
  fdr_alpha: 0.05
  fdr_method: "fdr_bh"  # Benjamini-Hochberg

# --- Visualization ----------------------------------------------------------
colors:
  WT: "#1964B0"
  APP: "#AE75A2"
  Tau: "#F4A637"

significance_markers:
  "***": 0.001
  "**": 0.01
  "*": 0.05

# --- Regression / Classification (Figure 7) ---------------------------------
classification:
  # Pre-built per-mouse feature matrix (ground truth, used for validation)
  # Set to null to rebuild from raw data; set path to use pre-built file
  # When null, pipeline builds from raw stride + T-maze CSVs (speed filter 15-25 cm/s, median aggregation)
  merged_data_csv: "scratch/2026-01-23-regression-model-design/merged_data_WT_vs_Tau_with_stepfreq.csv"
  # If merged_data_csv is null or missing, pipeline builds it from raw data
  n_splits: 5                   # StratifiedKFold splits
  random_state: 42
  target_genotypes: ["WT", "Tau"]  # binary classification
  # Hardcoded LMM p-values for gait features (GoPro batch, M2 model)
  # These are the authoritative values from the stride-level LMM analysis
  gait_lmm_pvalues:
    stride_length_euclid_cm: 4.693e-05
    step_freq_hz: 0.000310
    nose_lat_disp_norm: 0.00547
    temporal_symmetry: 0.00846
    duration_ms: 0.01278
    step_width_cm: 0.223
  # Hardcoded LMM p-values for T-maze features (where available)
  tmaze_lmm_pvalues:
    num_probes: 0.0041
    junction_explore_ms: 0.0989

# --- Regional analysis (Figure 6) ------------------------------------------
regional:
  regions: ["stem", "junction", "arm"]
  n_bins_per_region: 10
  metrics_subset:
    - stride_length_euclid_cm
    - step_freq_hz
    - limb_duty_factor_mean
    - temporal_symmetry
    - tailtip_lat_disp_norm
    - tailbase_lat_phase_pct
