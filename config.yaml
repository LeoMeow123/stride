# ============================================================================
# Gait Analysis Pipeline Configuration
# ============================================================================
# Single source of truth for all batch parameters, thresholds, metrics,
# and statistical model specifications.
#
# To add a new batch: add a new entry under `batches:` with the required fields.
# No code changes needed — run_analysis.py reads this file.
# ============================================================================

